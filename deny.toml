# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CDLA-Permissive-2.0", # webpki-root-certs, transitive dep of reqwest 0.13 via rustls-platform-verifier
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
skip = [
    { crate = "windows-sys@*" },
    # reqwest 0.13 / rustls ecosystem brings in older core-foundation via system-configuration
    { crate = "core-foundation@*" },
    # Different parts of the ecosystem use different getrandom minor versions
    { crate = "getrandom@*" },
    # r-efi is pulled in by both getrandom 0.3 (via cc/aws-lc-sys build deps) and getrandom 0.4 (uuid/tempfile)
    { crate = "r-efi@*" },
    # reqwest 0.13 still depends on thiserror 1.x via jni/rustls-platform-verifier; project uses 2.x
    { crate = "thiserror@*" },
    { crate = "thiserror-impl@*" },
    # getrandom 0.3 (via wasip2) and getrandom 0.4 (via wasip3/uuid/tempfile) pull in different wit-bindgen versions
    { crate = "wit-bindgen@*" },
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
