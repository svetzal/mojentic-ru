# Rustfmt configuration for consistent code formatting
# Run with: cargo fmt
#
# Note: nightly-only options (wrap_comments, format_code_in_doc_comments,
# format_strings, imports_granularity, group_imports, control_brace_style,
# comment_width, normalize_comments) have been removed to eliminate warnings
# when running on the stable toolchain.

# Edition
edition = "2021"

# Maximum line width
max_width = 100

# Indentation
tab_spaces = 4
hard_tabs = false

# Function formatting
fn_params_layout = "Tall"
fn_call_width = 80

# Chains and expressions
chain_width = 80
use_small_heuristics = "Default"

# Misc
newline_style = "Unix"
remove_nested_parens = true
use_field_init_shorthand = true
use_try_shorthand = true
